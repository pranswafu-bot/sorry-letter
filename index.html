<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm sorry baby 🥺</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top, #1a1a2e, #0f0c29);
    font-family: Arial, sans-serif;
    overflow:hidden;
    color:white;
}

/* floating 🙏 */
.heart{
    position:absolute;
    color:#ffffff;
    animation: floatUp 7s linear infinite;
    filter: drop-shadow(0 0 6px rgba(255,255,255,0.6));
}

@keyframes floatUp{
    0%{transform:translateY(100vh) scale(0.5); opacity:0;}
    50%{opacity:1;}
    100%{transform:translateY(-10vh) scale(1.2); opacity:0;}
}

/* card */
.card{
    width:340px;
    padding:25px;
    text-align:center;
    border-radius:20px;
    background:rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

/* PAPER */
.paper{
    width:220px;
    height:160px;
    margin:15px auto;
    background:#fffafc;
    border-radius:12px;
    position:relative;
    cursor:pointer;
    box-shadow:0 15px 30px rgba(0,0,0,0.3);
    overflow:hidden;
}

.paper-fold{
    position:absolute;
    top:0;
    right:0;
    width:0;
    height:0;
    border-left:60px solid transparent;
    border-top:60px solid #ffd6e7;
}

.paper::before{
    content:"";
    position:absolute;
    top:20px;
    left:20px;
    right:20px;
    bottom:20px;
    background:repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 18px,
        rgba(0,0,0,0.05) 19px
    );
}

.paper.open{
    animation:unfold 0.8s ease forwards;
}

@keyframes unfold{
    0%{transform:scale(0.9) rotateX(40deg); opacity:0.5;}
    100%{transform:scale(1.05) rotateX(0deg); opacity:1;}
}

/* MESSAGE */
.message{
    display:none;
    margin-top:15px;
    text-align:left;
    font-size:18px;
    line-height:1.8;
    font-family:'Great Vibes', cursive;
    color:white;
}

/* BUTTON */
button{
    margin-top:10px;
    padding:10px 20px;
    border:none;
    border-radius:25px;
    background:#ff4d88;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#ff1f66;
}
</style>
</head>

<body>

<div class="card">
    <h2>I’m sorry baby 🥺</h2>

    <div class="paper" id="paper" onclick="openLetter()">
        <div class="paper-fold"></div>
        <p style="margin-top:110px; font-size:12px; color:#888;">Tap to open 💌</p>
    </div>

    <button onclick="openLetter()">Open Letter </button>

    <div class="message" id="message"></div>
</div>

<!-- sound -->
<audio id="openSound" src="https://www.soundjay.com/misc/sounds/paper-ripping-01.mp3"></audio>

<script>

// floating 🙏
for(let i=0;i<25;i++){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="🙏";
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(Math.random()*3+4)+"s";
    heart.style.fontSize=(Math.random()*18+10)+"px";
    document.body.appendChild(heart);
}

// message text
const text = `
Hi baby

I’m really sorry baby, kung palagi nalang kita nakaka-tulugan and that was never my intention.
And 'wag kana po sana mag-tampo please 🥺
I never want to be the reason for your bad day.

Please forgive me.
I’ll do better, I promise.

I love you ❤️
`;

let i = 0;

function typeWriter(){
    if(i < text.length){
        document.getElementById("message").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 25);
    }
}

// OPEN LETTER
function openLetter(){
    document.getElementById("paper").classList.add("open");
    document.getElementById("message").style.display = "block";
    typeWriter();

    document.getElementById("openSound").play();
}

</script>

</body>
</html>
